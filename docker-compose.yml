version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tailor-website
    restart: unless-stopped
    environment:
      - ConnectionStrings__DefaultConnection=${DB_CONNECTION_STRING}
      - ASPNETCORE_ENVIRONMENT=Development
    networks:
      - db-network
      - proxy-network
    healthcheck:
      test: ["CMD-SHELL", "cat /proc/net/tcp6 | grep 1F90 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

networks:
  db-network:
    external: true
    name: db-network
  proxy-network:
    external: true
    name: proxy-network