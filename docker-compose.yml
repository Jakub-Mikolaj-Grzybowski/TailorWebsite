version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tailor-website
    restart: unless-stopped
    environment:
      - ConnectionStrings__DefaultConnection=${DB_CONNECTION_STRING}
      - ASPNETCORE_ENVIRONMENT=Development
    networks:
      - db-network
      - proxy-network

networks:
  db-network:
    external: true
    name: db-network
  proxy-network:
    external: true
    name: proxy-network